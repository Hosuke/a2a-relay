name: ci
on:
  push:
  pull_request:
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m py_compile a2a_relay/*.py tests/*.py
      - run: python -m unittest discover -s tests -q
      - run: python -m a2a_relay --base /tmp/a2a init --agent worker@example --agent operator@example
      - run: python -m a2a_relay --base /tmp/a2a contacts add --id reviewer@example --alias reviewer
      - run: python -m a2a_relay --base /tmp/a2a contacts list
      - run: python -m a2a_relay --base /tmp/a2a send --from worker@example --to operator@example --type request --subject hi --body hello --needs-reply
      - run: python -m a2a_relay --base /tmp/a2a send --from operator@example --to reviewer --type note --subject hi --body hello
      - run: python -m a2a_relay --base /tmp/a2a pending --agent operator@example
      - run: python -m a2a_relay --base /tmp/a2a poll --agent operator@example --allow-from worker@example --ack
      - run: python -m a2a_relay --base /tmp/a2a threads --contact worker@example
